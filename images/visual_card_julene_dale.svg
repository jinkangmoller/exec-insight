<svg width="1080" height="1080" viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="1080" height="1080" fill="#F5F0E8"/>

  <!-- Top label -->
  <text x="80" y="106"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="15" font-weight="700" fill="#E8453C" letter-spacing="2">MY EXEC STUDENTS' INSIGHT</text>
  <rect x="80" y="114" width="218" height="2.5" fill="#E8453C"/>

  <!-- Opening quotation marks -->
  <text x="80" y="230"
        font-family="'Times New Roman', Georgia, serif"
        font-size="90" font-weight="700" fill="#C0BAB0">&#x2018;</text>
  <text x="118" y="230"
        font-family="'Times New Roman', Georgia, serif"
        font-size="90" font-weight="700" fill="#C0BAB0">&#x2018;</text>

  <!-- Yellow highlight behind LINE 1 -->
  <rect x="76" y="258" width="862" height="60" fill="#FFE600" rx="3"/>

  <!-- LINE 1: "Slow is smooth, smooth is fast." -->
  <text x="80" y="304"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="44" font-weight="700" fill="#1A1A1A">Slow is smooth, smooth is fast.</text>

  <!-- LINE 2: "Practicing design skills brings" -->
  <text x="80" y="368"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="44" font-weight="700" fill="#1A1A1A">Practicing design skills brings</text>

  <!-- LINE 3: "more fluency even through it" -->
  <text x="80" y="432"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="44" font-weight="700" fill="#1A1A1A">more fluency even through it</text>

  <!-- LINE 4: "sometimes feels like swimming" -->
  <text x="80" y="496"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="44" font-weight="700" fill="#1A1A1A">sometimes feels like swimming</text>

  <!-- LINE 5: "through treacle." -->
  <text x="80" y="560"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="44" font-weight="700" fill="#1A1A1A">through treacle.</text>

  <!-- Thin rule -->
  <rect x="80" y="598" width="72" height="1.5" fill="#1A1A1A" opacity="0.25"/>

  <!-- Attribution -->
  <text x="80" y="634"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="22" fill="#7A7168" font-style="italic">Julene Dale — Mar 2026 cohort</text>

  <!-- Handle bottom right -->
  <text x="1000" y="1018"
        text-anchor="end"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="18" fill="#1A1A1A" opacity="0.5" letter-spacing="1">@JINKANGMOLLER</text>

  <!-- Coral dot bottom left -->
  <circle cx="80" cy="1012" r="5.5" fill="#E8453C" opacity="0.85"/>

