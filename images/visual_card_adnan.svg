  <rect x="80" y="114" width="218" height="2.5" fill="#E8453C"/>

  <!-- Opening quotation mark — serif "66" style -->
  <text x="80" y="246"
        font-family="'Times New Roman', Georgia, serif"
        font-size="95" font-weight="700" fill="#C0BAB0">&#x2018;</text>
  <text x="118" y="246"
        font-family="'Times New Roman', Georgia, serif"
        font-size="95" font-weight="700" fill="#C0BAB0">&#x2018;</text>

  <!-- LINE 1: "Too often we tend" -->
  <text x="80" y="330"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="66" font-weight="700" fill="#1A1A1A">Too often we tend</text>

  <!-- Yellow highlight behind LINE 2: "rush into the" -->
  <rect x="76" y="348" width="496" height="76" fill="#FFE600" rx="3"/>

  <!-- LINE 2: "rush into the" -->
  <text x="80" y="408"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="66" font-weight="700" fill="#1A1A1A">rush into the</text>

